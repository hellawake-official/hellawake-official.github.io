<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLAWAKE | WATCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="episodes-page">
<svg id="svg-filters"><filter id="living-curse"><feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="5"><animate attributeName="baseFrequency" dur="2s" values="0.015;0.05;0.015" repeatCount="indefinite"/></feTurbulence><feDisplacementMap in="SourceGraphic" scale="30"/></filter></svg>
<div id="cursor-wrap"><div id="cursor-dot"></div><div id="cursor-square"></div></div>
<div class="watch-container">
    <div class="top-bar"><a href="index.html" class="back-link hover-target">← RETURN</a></div>
    <div class="theater-header">
        <div class="series-info"><h1 id="display-title">—</h1></div>
        <div class="nav-controls">
            <button class="btn-nav hover-target" id="prev-btn" onclick="navEp(-1)">PREV</button>
            <button class="btn-nav hover-target" id="next-btn" onclick="navEp(1)">NEXT</button>
        </div>
    </div>
    <div class="player-wrapper">
        <div id="decrypt-overlay">HELLAWAKE LOADING...</div>
        <media-theme-sutro id="player-theme">
            <youtube-video slot="media" id="yt-player" playsinline></youtube-video>
        </media-theme-sutro>
    </div>
    <div class="content-layout">
        <div class="ep-description">
            <h2 id="desc-title">—</h2>
            <p id="desc-text"></p>
            <a href="#" id="download-btn" class="btn-download hover-target" >📖 READ BOOK VERSION</a>
        </div>
        <div class="playlist-area">
            <div class="season-tabs" id="season-tabs"></div>
            <div id="ep-list"></div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/player.style/sutro/+esm"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/youtube-video-element@1.0/+esm"></script>
<script src="content.js"></script>
<script src="main.js"></script>
<script>initEpisodesPage();</script>
</body>
</html>
