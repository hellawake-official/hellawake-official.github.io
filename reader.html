<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELLAWAKE // ARCHIVE READER</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0a0a; --surface: #111; --border: rgba(255,255,255,0.08);
  --accent: #ff3c00; --text: #d0d0d0; --muted: #555;
  --font-display: 'Oswald', sans-serif; --font-body: 'Inter', sans-serif;
}
html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); overflow:hidden; user-select:none; }

/* ── TOPBAR ── */
#reader-topbar {
  position:fixed; top:0; left:0; right:0; height:52px;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 20px; gap:16px; z-index:100;
}
#reader-title {
  font-family:var(--font-display); font-size:0.8rem; letter-spacing:4px;
  color:var(--text); text-transform:uppercase; flex:1;
}
.reader-btn {
  background:none; border:1px solid var(--border); color:var(--muted);
  font-family:var(--font-display); font-size:0.6rem; letter-spacing:2px;
  padding:5px 12px; cursor:pointer; transition:0.2s; text-decoration:none;
  display:inline-flex; align-items:center; gap:6px;
}
.reader-btn:hover { border-color:var(--accent); color:var(--accent); }
.reader-btn.icon-btn { padding:5px 10px; border-radius:2px; }
#page-info { font-size:0.7rem; color:var(--muted); letter-spacing:1px; white-space:nowrap; }
#zoom-display { font-size:0.7rem; color:var(--muted); letter-spacing:1px; min-width:48px; text-align:center; }

/* ── VIEWER ── */
#reader-body {
  position:fixed; top:52px; left:0; right:0; bottom:48px;
  overflow-y:auto; overflow-x:hidden; background:var(--bg);
  display:flex; flex-direction:column; align-items:center;
  padding:32px 0;
  scrollbar-width:thin; scrollbar-color:#222 #000;
}
#reader-body::-webkit-scrollbar { width:5px; }
#reader-body::-webkit-scrollbar-track { background:#000; }
#reader-body::-webkit-scrollbar-thumb { background:#222; }

.pdf-page-wrap {
  margin-bottom:20px; position:relative;
  box-shadow:0 4px 40px rgba(0,0,0,0.8);
}
.pdf-page-wrap canvas {
  display:block;
  /* Disable right-click saving */
  pointer-events:none;
}
/* Re-enable pointer for scrolling but block context menu */
#reader-body { pointer-events:all; }

/* ── BOTTOM BAR ── */
#reader-bottombar {
  position:fixed; bottom:0; left:0; right:0; height:48px;
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; gap:20px; z-index:100;
}
.page-nav-btn {
  background:none; border:none; color:var(--muted); font-size:1.1rem;
  cursor:pointer; padding:8px 16px; transition:0.2s;
}
.page-nav-btn:hover:not(:disabled) { color:var(--accent); }
.page-nav-btn:disabled { opacity:0.2; cursor:default; }
#page-slider {
  -webkit-appearance:none; appearance:none;
  width:200px; height:2px; background:var(--border);
  outline:none; border-radius:1px; cursor:pointer;
}
#page-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:12px; height:12px; border-radius:50%;
  background:var(--accent); cursor:pointer;
}

/* ── LOADING ── */
#reader-loading {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; z-index:200;
}
#loading-title { font-family:var(--font-display); font-size:0.8rem; letter-spacing:6px; color:var(--accent); }
#loading-bar-wrap { width:240px; height:1px; background:var(--border); }
#loading-bar { height:100%; background:var(--accent); width:0%; transition:width 0.3s; }
#loading-status { font-size:0.65rem; letter-spacing:2px; color:var(--muted); }

/* ── ERROR ── */
#reader-error {
  display:none; position:fixed; inset:0; background:var(--bg);
  align-items:center; justify-content:center; flex-direction:column; gap:16px;
}
#reader-error p { font-family:var(--font-display); font-size:0.8rem; letter-spacing:4px; color:var(--muted); }
</style>
</head>
<body>
<!-- LOADING -->
<div id="reader-loading">
  <div id="loading-title">LOADING ARCHIVE</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">INITIALISING...</div>
</div>

<!-- ERROR -->
<div id="reader-error">
  <p>ARCHIVE FILE NOT FOUND</p>
  <a href="javascript:history.back()" class="reader-btn">← RETURN</a>
</div>

<!-- TOPBAR -->
<div id="reader-topbar">
  <a href="javascript:history.back()" class="reader-btn">← BACK</a>
  <div id="reader-title">ARCHIVE READER</div>
  <div id="page-info">— / —</div>
  <button class="reader-btn icon-btn" onclick="zoomOut()" title="Zoom out">−</button>
  <div id="zoom-display">100%</div>
  <button class="reader-btn icon-btn" onclick="zoomIn()" title="Zoom in">+</button>
  <button class="reader-btn icon-btn" onclick="fitWidth()" title="Fit width">⊡</button>
</div>

<!-- VIEWER -->
<div id="reader-body" oncontextmenu="return false;"></div>

<!-- BOTTOM NAV -->
<div id="reader-bottombar">
  <button class="page-nav-btn" id="prev-btn" onclick="goPage(-1)" disabled>&#8592;</button>
  <input type="range" id="page-slider" min="1" value="1" oninput="goToPage(parseInt(this.value))">
  <button class="page-nav-btn" id="next-btn" onclick="goPage(1)">&#8594;</button>
</div>

<!-- PDF.js from cdnjs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
// Set worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Parse URL params
var params  = new URLSearchParams(window.location.search);
var pdfUrl  = params.get('book') || '';
var title   = params.get('title') || 'ARCHIVE DOCUMENT';

// Set title
document.getElementById('reader-title').textContent = title.toUpperCase().replace(/\+/g,' ');
document.title = 'HELLAWAKE // ' + title.replace(/\+/g,' ').toUpperCase();

var pdfDoc    = null;
var totalPages = 0;
var currentPage = 1;
var scale     = 1.4;
var rendering = false;
var pageCanvases = {};
var renderQueue = [];

var body      = document.getElementById('reader-body');
var pageInfo  = document.getElementById('page-info');
var slider    = document.getElementById('page-slider');
var prevBtn   = document.getElementById('prev-btn');
var nextBtn   = document.getElementById('next-btn');
var zoomDisp  = document.getElementById('zoom-display');
var loadBar   = document.getElementById('loading-bar');
var loadStatus = document.getElementById('loading-status');

function setLoadStatus(text, pct) {
  loadStatus.textContent = text;
  if (pct !== undefined) loadBar.style.width = pct + '%';
}

// Load PDF
if (!pdfUrl) {
  document.getElementById('reader-loading').style.display = 'none';
  document.getElementById('reader-error').style.display = 'flex';
} else {
  setLoadStatus('FETCHING ARCHIVE...', 10);
  pdfjsLib.getDocument({ url: pdfUrl, disableStream: false }).promise.then(function(pdf) {
    pdfDoc = pdf;
    totalPages = pdf.numPages;
    slider.max = totalPages;
    pageInfo.textContent = '1 / ' + totalPages;
    setLoadStatus('RENDERING PAGES...', 30);
    renderAllPages().then(function() {
      document.getElementById('reader-loading').style.display = 'none';
      updateNav();
      observePages();
    });
  }).catch(function(err) {
    console.error(err);
    document.getElementById('reader-loading').style.display = 'none';
    document.getElementById('reader-error').style.display = 'flex';
  });
}

function renderAllPages() {
  var promises = [];
  for (var i = 1; i <= totalPages; i++) {
    promises.push(renderPage(i));
  }
  return Promise.all(promises);
}

function renderPage(num) {
  return pdfDoc.getPage(num).then(function(page) {
    var viewport = page.getViewport({ scale: scale });
    var wrap = document.createElement('div');
    wrap.className = 'pdf-page-wrap';
    wrap.id = 'page-wrap-' + num;
    wrap.style.width = viewport.width + 'px';

    var canvas = document.createElement('canvas');
    canvas.width  = viewport.width;
    canvas.height = viewport.height;
    canvas.style.width  = viewport.width + 'px';
    canvas.style.height = viewport.height + 'px';
    wrap.appendChild(canvas);
    body.appendChild(wrap);
    pageCanvases[num] = canvas;

    var pct = Math.round(30 + (num / totalPages) * 65);
    setLoadStatus('RENDERING PAGE ' + num + ' OF ' + totalPages + '...', pct);

    return page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
  });
}

// IntersectionObserver to update page number as you scroll
function observePages() {
  var observer = new IntersectionObserver(function(entries) {
    var best = null, bestRatio = 0;
    entries.forEach(function(e) {
      if (e.intersectionRatio > bestRatio) { bestRatio = e.intersectionRatio; best = e.target; }
    });
    if (best) {
      var n = parseInt(best.id.replace('page-wrap-',''));
      if (n !== currentPage) {
        currentPage = n;
        pageInfo.textContent = n + ' / ' + totalPages;
        slider.value = n;
        updateNav();
      }
    }
  }, { root: body, threshold: [0.1, 0.5, 0.9] });

  document.querySelectorAll('.pdf-page-wrap').forEach(function(el) { observer.observe(el); });
}

function goPage(dir) {
  goToPage(currentPage + dir);
}

function goToPage(n) {
  n = Math.max(1, Math.min(totalPages, n));
  var wrap = document.getElementById('page-wrap-' + n);
  if (wrap) { wrap.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  currentPage = n;
  pageInfo.textContent = n + ' / ' + totalPages;
  slider.value = n;
  updateNav();
}

function updateNav() {
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPages;
}

// Keyboard nav
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') goPage(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp'   || e.key === 'PageUp')   goPage(-1);
  if (e.key === 'Home') goToPage(1);
  if (e.key === 'End')  goToPage(totalPages);
});

// Zoom
function zoomIn()  { scale = Math.min(scale + 0.2, 3.0); rerender(); }
function zoomOut() { scale = Math.max(scale - 0.2, 0.6); rerender(); }
function fitWidth() {
  var vw = body.clientWidth - 64;
  pdfDoc.getPage(1).then(function(page) {
    var vp = page.getViewport({ scale: 1 });
    scale = vw / vp.width;
    rerender();
  });
}

function rerender() {
  zoomDisp.textContent = Math.round(scale * 100) + '%';
  // Clear and re-render all pages
  body.innerHTML = '';
  pageCanvases = {};
  renderAllPages().then(function() {
    observePages();
    goToPage(currentPage);
    document.getElementById('reader-loading').style.display = 'none';
  });
  document.getElementById('reader-loading').style.display = 'flex';
  setLoadStatus('RE-RENDERING...', 20);
}

// Block right-click everywhere
document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });

// Block keyboard shortcuts for saving
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'p' || e.key === 'S' || e.key === 'P')) {
    e.preventDefault(); return false;
  }
});
</script>
</body>
</html>
