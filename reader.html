<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELLAWAKE // ARCHIVE READER</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CJ2EVB64KV"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-CJ2EVB64KV');</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0a0a; --surface:#111; --surface2:#1a1a1a; --border:rgba(255,255,255,0.08);
  --accent:#ff3c00; --text:#d0d0d0; --muted:#555; --dim:#333;
  --font-display:'Oswald',sans-serif; --font-body:'Inter',sans-serif;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); overflow:hidden; user-select:none; }

/* ── TOPBAR ── */
#reader-topbar {
  position:fixed; top:0; left:0; right:0; height:52px;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 16px; gap:10px; z-index:100;
}
#reader-title { font-family:var(--font-display); font-size:0.75rem; letter-spacing:3px; color:var(--text); text-transform:uppercase; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.reader-btn {
  background:none; border:1px solid var(--border); color:var(--muted);
  font-family:var(--font-display); font-size:0.6rem; letter-spacing:2px;
  padding:5px 10px; cursor:pointer; transition:0.2s; text-decoration:none;
  display:inline-flex; align-items:center; gap:5px; white-space:nowrap; flex-shrink:0;
}
.reader-btn:hover { border-color:var(--accent); color:var(--accent); }
.reader-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(255,60,0,0.08); }
#page-info { font-size:0.7rem; color:var(--muted); letter-spacing:1px; white-space:nowrap; flex-shrink:0; }
#zoom-display { font-size:0.7rem; color:var(--muted); letter-spacing:1px; min-width:44px; text-align:center; flex-shrink:0; }

/* ── VIEWER ── */
#reader-body {
  position:fixed; top:52px; left:0; right:0; bottom:48px;
  overflow-y:auto; overflow-x:hidden; background:var(--bg);
  display:flex; flex-direction:column; align-items:center;
  padding:28px 0;
  scrollbar-width:thin; scrollbar-color:#222 #000;
}
#reader-body::-webkit-scrollbar { width:5px; }
#reader-body::-webkit-scrollbar-thumb { background:#222; }

/* Single page mode */
.pdf-page-wrap { margin-bottom:20px; position:relative; box-shadow:0 4px 40px rgba(0,0,0,0.8); }
.pdf-page-wrap canvas { display:block; }

/* Double page mode */
.double-page-row { display:flex; gap:8px; margin-bottom:20px; }
.double-page-row .pdf-page-wrap { margin-bottom:0; }

/* Bookmark indicator */
.page-bookmark-dot {
  position:absolute; top:8px; right:8px; width:10px; height:10px;
  background:var(--accent); border-radius:50%; display:none; z-index:2;
}
.page-bookmark-dot.active { display:block; }

/* ── BOTTOM BAR ── */
#reader-bottombar {
  position:fixed; bottom:0; left:0; right:0; height:48px;
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; gap:16px; z-index:100;
}
.page-nav-btn {
  background:none; border:none; color:var(--muted); font-size:1.1rem;
  cursor:pointer; padding:8px 16px; transition:0.2s; flex-shrink:0;
}
.page-nav-btn:hover:not(:disabled) { color:var(--accent); }
.page-nav-btn:disabled { opacity:0.2; cursor:default; }
#page-slider {
  -webkit-appearance:none; appearance:none;
  width:180px; height:2px; background:var(--border);
  outline:none; cursor:pointer;
}
#page-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:12px; height:12px;
  border-radius:50%; background:var(--accent); cursor:pointer;
}

/* ── BOOKMARKS PANEL ── */
#bookmarks-panel {
  position:fixed; top:52px; right:0; bottom:48px; width:220px;
  background:var(--surface); border-left:1px solid var(--border);
  z-index:90; transform:translateX(100%); transition:transform 0.25s;
  overflow-y:auto; padding:16px;
}
#bookmarks-panel.open { transform:translateX(0); }
.bm-title { font-family:var(--font-display); font-size:0.65rem; letter-spacing:3px; color:var(--dim); margin-bottom:12px; }
.bm-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px; background:var(--surface2); border:1px solid var(--border);
  margin-bottom:6px; cursor:pointer; transition:border-color 0.15s;
}
.bm-item:hover { border-color:var(--accent); }
.bm-item-page { font-family:var(--font-display); font-size:0.7rem; letter-spacing:2px; color:var(--text); }
.bm-item-note { font-size:11px; color:var(--muted); margin-top:2px; }
.bm-item-del { background:none; border:none; color:var(--dim); cursor:pointer; font-size:0.8rem; padding:2px 6px; }
.bm-item-del:hover { color:#cc2200; }
.bm-empty { font-size:11px; color:var(--dim); text-align:center; padding:20px 0; }
.bm-add { width:100%; margin-top:12px; }

/* ── PROGRESS BAR ── */
#reading-progress {
  position:fixed; top:52px; left:0; right:0; height:2px;
  background:var(--border); z-index:99;
}
#reading-progress-bar { height:100%; background:var(--accent); width:0%; transition:width 0.2s; }

/* ── LOADING ── */
#reader-loading {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; z-index:200;
}
#loading-title { font-family:var(--font-display); font-size:0.8rem; letter-spacing:6px; color:var(--accent); }
#loading-bar-wrap { width:240px; height:1px; background:var(--border); }
#loading-bar { height:100%; background:var(--accent); width:0%; transition:width 0.3s; }
#loading-status { font-size:0.65rem; letter-spacing:2px; color:var(--muted); }
#reader-error { display:none; position:fixed; inset:0; background:var(--bg); align-items:center; justify-content:center; flex-direction:column; gap:16px; }
#reader-error p { font-family:var(--font-display); font-size:0.8rem; letter-spacing:4px; color:var(--muted); }
</style>
</head>
<body>
<div id="reader-loading">
  <div id="loading-title">LOADING ARCHIVE</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">INITIALISING...</div>
</div>
<div id="reader-error">
  <p>ARCHIVE FILE NOT FOUND</p>
  <a href="javascript:history.back()" class="reader-btn">← RETURN</a>
</div>

<!-- TOPBAR -->
<div id="reader-topbar">
  <a href="javascript:history.back()" class="reader-btn">← BACK</a>
  <div id="reader-title">ARCHIVE READER</div>
  <div id="page-info">— / —</div>
  <button class="reader-btn icon-btn" onclick="zoomOut()" title="Zoom out">−</button>
  <div id="zoom-display">100%</div>
  <button class="reader-btn icon-btn" onclick="zoomIn()" title="Zoom in">+</button>
  <button class="reader-btn icon-btn" onclick="fitWidth()" title="Fit width">⊡</button>
  <button class="reader-btn icon-btn" id="double-btn" onclick="toggleDoubleMode()" title="Double page">⊞</button>
  <button class="reader-btn icon-btn" id="bookmark-add-btn" onclick="addBookmark()" title="Add bookmark">🔖</button>
  <button class="reader-btn icon-btn" id="bookmarks-toggle-btn" onclick="toggleBookmarksPanel()" title="View bookmarks">≡</button>
</div>

<!-- READING PROGRESS -->
<div id="reading-progress"><div id="reading-progress-bar"></div></div>

<!-- VIEWER -->
<div id="reader-body" oncontextmenu="return false;"></div>

<!-- BOOKMARKS PANEL -->
<div id="bookmarks-panel">
  <div class="bm-title">BOOKMARKS</div>
  <div id="bm-list"></div>
  <div class="bm-empty" id="bm-empty">No bookmarks yet.<br>Press 🔖 to add one.</div>
</div>

<!-- BOTTOM NAV -->
<div id="reader-bottombar">
  <button class="page-nav-btn" id="prev-btn" onclick="goPage(-1)" disabled>&#8592;</button>
  <input type="range" id="page-slider" min="1" value="1" oninput="goToPage(parseInt(this.value))">
  <button class="page-nav-btn" id="next-btn" onclick="goPage(1)">&#8594;</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var params   = new URLSearchParams(window.location.search);
var pdfUrl   = params.get('book') || '';
var title    = params.get('title') || 'ARCHIVE DOCUMENT';
var storageKey = 'reader_' + pdfUrl.replace(/[^a-z0-9]/gi,'_');

document.getElementById('reader-title').textContent = title.replace(/\+/g,' ').toUpperCase();
document.title = 'HELLAWAKE // ' + title.replace(/\+/g,' ').toUpperCase();

var pdfDoc = null, totalPages = 0, currentPage = 1;
var scale = 1.4, doubleMode = false, rendering = false;
var pageCanvases = {};

var body      = document.getElementById('reader-body');
var pageInfo  = document.getElementById('page-info');
var slider    = document.getElementById('page-slider');
var prevBtn   = document.getElementById('prev-btn');
var nextBtn   = document.getElementById('next-btn');
var zoomDisp  = document.getElementById('zoom-display');
var loadBar   = document.getElementById('loading-bar');
var loadStatus = document.getElementById('loading-status');
var progressBar = document.getElementById('reading-progress-bar');

function setLoadStatus(text, pct) {
  loadStatus.textContent = text;
  if (pct !== undefined) loadBar.style.width = pct + '%';
}

// Load saved position
var savedData = {};
try { savedData = JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch(e){}
if (savedData.page) currentPage = savedData.page;
if (savedData.scale) scale = savedData.scale;

function saveProgress() {
  try { localStorage.setItem(storageKey, JSON.stringify({ page: currentPage, scale: scale, bookmarks: getBookmarks() })); } catch(e){}
}

// ── BOOKMARKS ──
function getBookmarks() {
  return savedData.bookmarks || [];
}
function addBookmark() {
  var bms = getBookmarks();
  if (bms.find(function(b){ return b.page === currentPage; })) return; // already bookmarked
  bms.push({ page: currentPage, note: 'Page ' + currentPage });
  savedData.bookmarks = bms;
  saveProgress();
  renderBookmarksList();
  updateBookmarkDot();
  // Flash the button
  var btn = document.getElementById('bookmark-add-btn');
  btn.classList.add('active');
  setTimeout(function(){ btn.classList.remove('active'); }, 800);
}
function removeBookmark(page) {
  savedData.bookmarks = getBookmarks().filter(function(b){ return b.page !== page; });
  saveProgress();
  renderBookmarksList();
  updateBookmarkDot();
}
function renderBookmarksList() {
  var bms = getBookmarks();
  var list = document.getElementById('bm-list');
  var empty = document.getElementById('bm-empty');
  if (!bms.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = bms.sort(function(a,b){ return a.page-b.page; }).map(function(bm) {
    return '<div class="bm-item" onclick="goToPage('+bm.page+');toggleBookmarksPanel(false);">' +
      '<div><div class="bm-item-page">PAGE ' + bm.page + '</div></div>' +
      '<button class="bm-item-del" onclick="event.stopPropagation();removeBookmark('+bm.page+')">✕</button>' +
    '</div>';
  }).join('');
}
function toggleBookmarksPanel(force) {
  var panel = document.getElementById('bookmarks-panel');
  var isOpen = panel.classList.contains('open');
  var shouldOpen = force !== undefined ? force : !isOpen;
  panel.classList.toggle('open', shouldOpen);
  document.getElementById('bookmarks-toggle-btn').classList.toggle('active', shouldOpen);
  // Shrink body when panel open
  body.style.right = shouldOpen ? '220px' : '0';
}
function updateBookmarkDot() {
  // Show orange dot on bookmarked pages
  var bms = getBookmarks().map(function(b){ return b.page; });
  document.querySelectorAll('.page-bookmark-dot').forEach(function(dot, i) {
    dot.classList.toggle('active', bms.includes(i+1));
  });
}

// ── LOAD PDF ──
if (!pdfUrl) {
  document.getElementById('reader-loading').style.display = 'none';
  document.getElementById('reader-error').style.display = 'flex';
} else {
  setLoadStatus('FETCHING ARCHIVE...', 10);
  pdfjsLib.getDocument({ url: pdfUrl }).promise.then(function(pdf) {
    pdfDoc = pdf;
    totalPages = pdf.numPages;
    slider.max = totalPages;
    pageInfo.textContent = currentPage + ' / ' + totalPages;
    setLoadStatus('RENDERING PAGES...', 30);
    renderAllPages().then(function() {
      document.getElementById('reader-loading').style.display = 'none';
      updateNav();
      observePages();
      renderBookmarksList();
      // Jump to saved page
      if (currentPage > 1) setTimeout(function(){ goToPage(currentPage); }, 100);
      zoomDisp.textContent = Math.round(scale*100) + '%';
    });
  }).catch(function(err) {
    console.error(err);
    document.getElementById('reader-loading').style.display = 'none';
    document.getElementById('reader-error').style.display = 'flex';
  });
}

function renderAllPages() {
  var promises = [];
  if (doubleMode) {
    // Render in pairs
    for (var i = 1; i <= totalPages; i += 2) {
      promises.push(renderDoublePage(i));
    }
  } else {
    for (var i = 1; i <= totalPages; i++) {
      promises.push(renderPage(i));
    }
  }
  return Promise.all(promises);
}

function renderPage(num) {
  return pdfDoc.getPage(num).then(function(page) {
    var viewport = page.getViewport({ scale: scale });
    var wrap = document.createElement('div');
    wrap.className = 'pdf-page-wrap';
    wrap.id = 'page-wrap-' + num;
    wrap.style.width = viewport.width + 'px';
    var dot = document.createElement('div');
    dot.className = 'page-bookmark-dot';
    dot.id = 'bm-dot-' + num;
    wrap.appendChild(dot);
    var canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    wrap.appendChild(canvas);
    body.appendChild(wrap);
    pageCanvases[num] = canvas;
    var pct = Math.round(30 + (num / totalPages) * 65);
    setLoadStatus('RENDERING PAGE ' + num + ' OF ' + totalPages + '...', pct);
    return page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
  });
}

function renderDoublePage(num) {
  var row = document.createElement('div');
  row.className = 'double-page-row';
  row.id = 'double-row-' + num;
  body.appendChild(row);
  var p1 = renderPageInto(num, row);
  var p2 = num + 1 <= totalPages ? renderPageInto(num + 1, row) : Promise.resolve();
  return Promise.all([p1, p2]);
}

function renderPageInto(num, container) {
  return pdfDoc.getPage(num).then(function(page) {
    var vw = (body.clientWidth - 80) / 2;
    var vp0 = page.getViewport({ scale: 1 });
    var s = Math.min(vw / vp0.width, scale);
    var viewport = page.getViewport({ scale: s });
    var wrap = document.createElement('div');
    wrap.className = 'pdf-page-wrap';
    wrap.id = 'page-wrap-' + num;
    wrap.style.width = viewport.width + 'px';
    var dot = document.createElement('div');
    dot.className = 'page-bookmark-dot'; dot.id = 'bm-dot-' + num;
    wrap.appendChild(dot);
    var canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    wrap.appendChild(canvas);
    container.appendChild(wrap);
    pageCanvases[num] = canvas;
    return page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
  });
}

function observePages() {
  updateBookmarkDot();
  var observer = new IntersectionObserver(function(entries) {
    var best = null, bestRatio = 0;
    entries.forEach(function(e) {
      if (e.intersectionRatio > bestRatio) { bestRatio = e.intersectionRatio; best = e.target; }
    });
    if (best) {
      var n = parseInt(best.id.replace('page-wrap-',''));
      if (n !== currentPage) {
        currentPage = n;
        pageInfo.textContent = n + ' / ' + totalPages;
        slider.value = n;
        updateNav();
        saveProgress();
        // Update progress bar
        progressBar.style.width = Math.round((n / totalPages) * 100) + '%';
      }
    }
  }, { root: body, threshold: [0.1, 0.5] });
  document.querySelectorAll('.pdf-page-wrap').forEach(function(el) { observer.observe(el); });
}

function goPage(dir) { goToPage(currentPage + dir); }
function goToPage(n) {
  n = Math.max(1, Math.min(totalPages, n));
  var wrap = document.getElementById('page-wrap-' + n);
  if (wrap) wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  currentPage = n; pageInfo.textContent = n + ' / ' + totalPages;
  slider.value = n; updateNav();
}
function updateNav() {
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPages;
}

// Keyboard nav
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') goPage(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp'   || e.key === 'PageUp')   goPage(-1);
  if (e.key === 'Home') goToPage(1);
  if (e.key === 'End')  goToPage(totalPages);
  if (e.key === 'b' || e.key === 'B') addBookmark();
  if ((e.ctrlKey || e.metaKey) && (e.key==='s'||e.key==='p'||e.key==='S'||e.key==='P')) e.preventDefault();
});

// Zoom
function zoomIn()  { scale = Math.min(scale + 0.2, 3.0); rerender(); }
function zoomOut() { scale = Math.max(scale - 0.2, 0.6); rerender(); }
function fitWidth() {
  pdfDoc.getPage(1).then(function(page) {
    var vw = body.clientWidth - 64;
    var vp = page.getViewport({ scale: 1 });
    scale = vw / vp.width;
    rerender();
  });
}
function toggleDoubleMode() {
  doubleMode = !doubleMode;
  document.getElementById('double-btn').classList.toggle('active', doubleMode);
  rerender();
}
function rerender() {
  zoomDisp.textContent = Math.round(scale * 100) + '%';
  body.innerHTML = '';
  pageCanvases = {};
  document.getElementById('reader-loading').style.display = 'flex';
  setLoadStatus('RE-RENDERING...', 20);
  renderAllPages().then(function() {
    document.getElementById('reader-loading').style.display = 'none';
    observePages();
    setTimeout(function(){ goToPage(currentPage); }, 100);
    saveProgress();
  });
}

// Block right-click
document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
</script>
</body>
</html>
