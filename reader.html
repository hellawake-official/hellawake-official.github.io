<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HELLAWAKE // ARCHIVE READER</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0c0c0c;--surface:#161616;--surface2:#1e1e1e;
  --border:rgba(255,255,255,0.07);--accent:#ff3c00;
  --text:#d0d0d0;--muted:#555;--dim:#333;
  --font-display:'Oswald',sans-serif;--font-body:'Inter',sans-serif;
  --topbar:52px;--bottombar:48px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body);user-select:none;}

/* ── TOPBAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100;
}
#reader-title{font-family:var(--font-display);font-size:0.72rem;letter-spacing:3px;color:var(--text);text-transform:uppercase;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tbtn{
  background:none;border:1px solid var(--border);color:var(--muted);
  font-family:var(--font-display);font-size:0.58rem;letter-spacing:1px;
  padding:5px 9px;cursor:pointer;transition:0.15s;white-space:nowrap;
  display:inline-flex;align-items:center;gap:4px;flex-shrink:0;
}
.tbtn:hover,.tbtn.active{border-color:var(--accent);color:var(--accent);}
#page-display{font-size:0.68rem;color:var(--muted);letter-spacing:1px;white-space:nowrap;cursor:pointer;padding:4px 8px;border:1px solid transparent;transition:0.15s;}
#page-display:hover{border-color:var(--border);}
#page-input{display:none;width:60px;font-size:0.7rem;text-align:center;background:var(--surface2);border:1px solid var(--accent);color:var(--text);padding:4px;font-family:var(--font-body);}
#zoom-display{font-size:0.68rem;color:var(--muted);letter-spacing:1px;min-width:42px;text-align:center;}

/* ── PROGRESS BAR ── */
#prog-bar{position:fixed;top:var(--topbar);left:0;right:0;height:2px;background:var(--border);z-index:99;}
#prog-fill{height:100%;background:var(--accent);width:0%;transition:width 0.2s;}

/* ── VIEWPORT ── */
#viewport{
  position:fixed;
  top:calc(var(--topbar) + 2px);
  left:0;right:0;
  bottom:var(--bottombar);
  overflow:hidden;
  background:var(--bg);
  cursor:grab;
}
#viewport.grabbing{cursor:grabbing;}

/* ── CANVAS CONTAINER ── */
#canvas-container{
  position:absolute;
  top:0;left:0;
  transform-origin:top left;
  display:flex;flex-direction:column;align-items:center;
  padding:24px;gap:16px;
  will-change:transform;
}
.page-wrap{
  position:relative;
  box-shadow:0 2px 24px rgba(0,0,0,0.7);
  flex-shrink:0;
}
.page-wrap canvas{display:block;}
.page-bm-dot{
  position:absolute;top:8px;right:8px;
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);display:none;z-index:2;
}
.page-bm-dot.on{display:block;}

/* ── BOTTOM BAR ── */
#bottombar{
  position:fixed;bottom:0;left:0;right:0;height:var(--bottombar);
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;gap:12px;z-index:100;
}
.navbtn{background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:8px 18px;transition:0.15s;}
.navbtn:hover:not(:disabled){color:var(--accent);}
.navbtn:disabled{opacity:0.2;cursor:default;}
#scrubber{-webkit-appearance:none;appearance:none;width:160px;height:2px;background:var(--border);outline:none;cursor:pointer;}
#scrubber::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer;}

/* ── BOOKMARKS PANEL ── */
#bm-panel{
  position:fixed;top:var(--topbar);right:0;bottom:var(--bottombar);width:200px;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:90;transform:translateX(100%);transition:transform 0.25s;
  overflow-y:auto;padding:14px;
}
#bm-panel.open{transform:translateX(0);}
.bm-head{font-family:var(--font-display);font-size:0.6rem;letter-spacing:3px;color:var(--dim);margin-bottom:10px;}
.bm-item{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;background:var(--surface2);border:1px solid var(--border);margin-bottom:5px;cursor:pointer;transition:0.15s;}
.bm-item:hover{border-color:var(--accent);}
.bm-pg{font-family:var(--font-display);font-size:0.65rem;letter-spacing:2px;}
.bm-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:0.7rem;padding:2px 5px;}
.bm-del:hover{color:#cc2200;}
.bm-empty{font-size:11px;color:var(--dim);text-align:center;padding:16px 0;}

/* ── LOADING ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:200;}
#load-title{font-family:var(--font-display);font-size:0.75rem;letter-spacing:5px;color:var(--accent);}
#load-bar-wrap{width:220px;height:1px;background:var(--border);}
#load-bar{height:100%;background:var(--accent);width:0%;transition:width 0.3s;}
#load-status{font-size:0.6rem;letter-spacing:2px;color:var(--muted);}
#error-screen{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#error-screen p{font-family:var(--font-display);font-size:0.75rem;letter-spacing:4px;color:var(--muted);}
</style>
</head>
<body>
<div id="loader">
  <div id="load-title">LOADING ARCHIVE</div>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
  <div id="load-status">INITIALISING...</div>
</div>
<div id="error-screen">
  <p>ARCHIVE NOT FOUND</p>
  <a href="javascript:history.back()" style="background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--font-display);font-size:0.6rem;letter-spacing:2px;padding:6px 14px;text-decoration:none;cursor:pointer;">← BACK</a>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <a href="javascript:history.back()" class="tbtn">← BACK</a>
  <div id="reader-title">ARCHIVE READER</div>
  <div id="page-display">— / —</div>
  <input id="page-input" type="number" min="1" placeholder="pg">
  <button class="tbtn" onclick="zoomOut()">−</button>
  <span id="zoom-display">100%</span>
  <button class="tbtn" onclick="zoomIn()">+</button>
  <button class="tbtn" id="fit-btn" onclick="cyclefit()" title="Fit mode">⊡</button>
  <button class="tbtn" id="dbl-btn" onclick="toggleDouble()" title="Double page">⊞</button>
  <button class="tbtn" id="bm-btn" onclick="addBookmark()" title="Bookmark (B)">BM</button>
  <button class="tbtn" id="bm-panel-btn" onclick="toggleBmPanel()">≡</button>
</div>
<div id="prog-bar"><div id="prog-fill"></div></div>

<!-- VIEWPORT -->
<div id="viewport">
  <div id="canvas-container"></div>
</div>

<!-- BOOKMARKS -->
<div id="bm-panel">
  <div class="bm-head">BOOKMARKS</div>
  <div id="bm-list"></div>
  <div class="bm-empty" id="bm-empty">No bookmarks.<br>Press B to add.</div>
</div>

<!-- BOTTOM BAR -->
<div id="bottombar">
  <button class="navbtn" id="prev-btn" onclick="prevPage()" disabled>←</button>
  <input type="range" id="scrubber" min="1" value="1" oninput="scrubTo(+this.value)">
  <button class="navbtn" id="next-btn" onclick="nextPage()">→</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── PARAMS ──
var params  = new URLSearchParams(location.search);
var pdfUrl  = params.get('book')||'';
var title   = decodeURIComponent(params.get('title')||'ARCHIVE DOCUMENT').replace(/\+/g,' ');
var storeKey= 'hwreader_'+(pdfUrl.replace(/\W/g,'_'));

document.getElementById('reader-title').textContent = title.toUpperCase();
document.title = 'HELLAWAKE // '+title.toUpperCase();

// ── STATE ──
var pdf=null, totalPages=0, currentPage=1;
var scale=1.4, fitMode='width'; // width | page | none
var doubleMode=false;
var txX=0, txY=0; // canvas container translation
var pageHeights=[], pageWidths=[];
var rendered=false;

// ── ELEMENTS ──
var vp      = document.getElementById('viewport');
var cc      = document.getElementById('canvas-container');
var pgDisp  = document.getElementById('page-display');
var pgInput = document.getElementById('page-input');
var scrub   = document.getElementById('scrubber');
var zmDisp  = document.getElementById('zoom-display');
var loadBar = document.getElementById('load-bar');
var loadSt  = document.getElementById('load-status');
var progFill= document.getElementById('prog-fill');

// ── STORAGE ──
var store={};
try{store=JSON.parse(localStorage.getItem(storeKey)||'{}');}catch(e){}
function save(){try{localStorage.setItem(storeKey,JSON.stringify(store));}catch(e){}}

// ── LOAD ──
if(!pdfUrl){
  document.getElementById('loader').style.display='none';
  document.getElementById('error-screen').style.display='flex';
}else{
  // Restore state
  if(store.page) currentPage=store.page;
  if(store.scale) scale=store.scale;

  loadSt.textContent='FETCHING...';
  pdfjsLib.getDocument(pdfUrl).promise.then(function(doc){
    pdf=doc; totalPages=doc.numPages;
    scrub.max=totalPages;
    loadSt.textContent='RENDERING...';
    renderAll().then(function(){
      document.getElementById('loader').style.display='none';
      rendered=true;
      applyFit();
      jumpToPage(currentPage, false);
      renderBmList();
      zmDisp.textContent=Math.round(scale*100)+'%';
    });
  }).catch(function(){
    document.getElementById('loader').style.display='none';
    document.getElementById('error-screen').style.display='flex';
  });
}

// ── RENDER ──
function renderAll(){
  cc.innerHTML='';
  pageHeights=[];pageWidths=[];
  var tasks=[];
  for(var i=1;i<=totalPages;i++) tasks.push(renderPage(i));
  return Promise.all(tasks);
}

function renderPage(n){
  return pdf.getPage(n).then(function(page){
    var vport=page.getViewport({scale:scale});
    var wrap=document.createElement('div');
    wrap.className='page-wrap'; wrap.id='pw'+n;
    var dot=document.createElement('div');
    dot.className='page-bm-dot'; dot.id='bmdot'+n;
    wrap.appendChild(dot);
    var canvas=document.createElement('canvas');
    canvas.width=vport.width; canvas.height=vport.height;
    wrap.appendChild(canvas);
    cc.appendChild(wrap);
    pageHeights[n]=vport.height;
    pageWidths[n]=vport.width;
    var pct=Math.round(10+(n/totalPages)*85);
    loadBar.style.width=pct+'%';
    loadSt.textContent='PAGE '+n+' / '+totalPages;
    return page.render({canvasContext:canvas.getContext('2d'),viewport:vport}).promise;
  });
}

// ── FIT MODES ──
function applyFit(){
  var vpW=vp.clientWidth, vpH=vp.clientHeight;
  if(!pageWidths[1]) return;
  var pw=pageWidths[1], ph=pageHeights[1];
  if(fitMode==='width'){
    scale=(vpW-48)/pw;
  } else if(fitMode==='page'){
    scale=Math.min((vpW-48)/pw, (vpH-48)/ph);
  }
  rerender();
}

function cyclefit(){
  var modes=['width','page','none'];
  var idx=modes.indexOf(fitMode);
  fitMode=modes[(idx+1)%modes.length];
  var labels={width:'FIT W',page:'FIT P',none:'FREE'};
  document.getElementById('fit-btn').textContent=labels[fitMode];
  if(fitMode!=='none') applyFit();
}

// ── ZOOM ──
function zoomIn(){fitMode='none';scale=Math.min(scale*1.25,5);rerender();}
function zoomOut(){fitMode='none';scale=Math.max(scale/1.25,0.3);rerender();}

function rerender(){
  if(!pdf) return;
  zmDisp.textContent=Math.round(scale*100)+'%';
  store.scale=scale; save();
  var savedPage=currentPage;
  rendered=false;
  cc.innerHTML='';
  pageHeights=[];pageWidths=[];
  renderAll().then(function(){
    rendered=true;
    jumpToPage(savedPage,false);
    updateBmDots();
  });
}

// ── NAVIGATION ──
function jumpToPage(n, animate){
  n=Math.max(1,Math.min(totalPages,n));
  currentPage=n;
  var pw=document.getElementById('pw'+n);
  if(!pw) return;
  // Calculate Y offset to center this page
  var vpH=vp.clientHeight;
  var targetY=pw.offsetTop;
  txY=-targetY+24;
  // Center X
  var vpW=vp.clientWidth;
  var pageW=pw.offsetWidth;
  txX=pageW<vpW ? (vpW-pageW)/2 : 24;
  applyTransform(animate!==false);
  updateUI();
  store.page=n; save();
}

function applyTransform(smooth){
  if(smooth){
    cc.style.transition='transform 0.3s cubic-bezier(0.23,1,0.32,1)';
    setTimeout(function(){cc.style.transition='';},350);
  }
  cc.style.transform='translate('+txX+'px,'+txY+'px)';
}

function prevPage(){jumpToPage(currentPage-1,true);}
function nextPage(){jumpToPage(currentPage+1,true);}
function scrubTo(n){jumpToPage(n,false);}

function updateUI(){
  pgDisp.textContent=currentPage+' / '+totalPages;
  scrub.value=currentPage;
  document.getElementById('prev-btn').disabled=currentPage<=1;
  document.getElementById('next-btn').disabled=currentPage>=totalPages;
  progFill.style.width=Math.round((currentPage/totalPages)*100)+'%';
}

// ── PAGE NUMBER CLICK TO JUMP ──
pgDisp.addEventListener('click',function(){
  pgDisp.style.display='none';
  pgInput.style.display='block';
  pgInput.value=currentPage;
  pgInput.focus(); pgInput.select();
});
pgInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){var n=parseInt(pgInput.value);if(n&&n>=1&&n<=totalPages)jumpToPage(n,true);}
  if(e.key==='Enter'||e.key==='Escape'){pgInput.style.display='none';pgDisp.style.display='';}
});
pgInput.addEventListener('blur',function(){pgInput.style.display='none';pgDisp.style.display='';});

// ── DRAG TO PAN ──
var dragging=false,dragStartX=0,dragStartY=0,txStartX=0,txStartY=0;
vp.addEventListener('mousedown',function(e){
  if(e.button!==0) return;
  dragging=true; dragStartX=e.clientX; dragStartY=e.clientY;
  txStartX=txX; txStartY=txY;
  vp.classList.add('grabbing');
});
window.addEventListener('mousemove',function(e){
  if(!dragging) return;
  txX=txStartX+(e.clientX-dragStartX);
  txY=txStartY+(e.clientY-dragStartY);
  cc.style.transform='translate('+txX+'px,'+txY+'px)';
  // Update current page based on scroll position
  updatePageFromPos();
});
window.addEventListener('mouseup',function(){
  if(dragging){dragging=false;vp.classList.remove('grabbing');}
});

// ── TOUCH PAN & PINCH ──
var touches={},pinchStart=0,scaleStart=1,lastTouchX=0,lastTouchY=0,touchStartTxX=0,touchStartTxY=0;
var pinching=false, panning=false;

vp.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    pinching=true; panning=false;
    pinchStart=getDist(e.touches);
    scaleStart=scale;
    e.preventDefault();
  } else if(e.touches.length===1){
    panning=true;
    lastTouchX=e.touches[0].clientX;
    lastTouchY=e.touches[0].clientY;
    touchStartTxX=txX; touchStartTxY=txY;
  }
},{passive:false});

vp.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(pinching && e.touches.length===2){
    var d=getDist(e.touches);
    scale=Math.max(0.3,Math.min(5,scaleStart*(d/pinchStart)));
    zmDisp.textContent=Math.round(scale*100)+'%';
    // Live CSS scale for smooth feel - re-render on end
    cc.style.transform='translate('+txX+'px,'+txY+'px) scale('+(scale/scaleStart)+')';
  } else if(panning && e.touches.length===1){
    var dx=e.touches[0].clientX-lastTouchX;
    var dy=e.touches[0].clientY-lastTouchY;
    txX+=dx; txY+=dy;
    lastTouchX=e.touches[0].clientX;
    lastTouchY=e.touches[0].clientY;
    cc.style.transform='translate('+txX+'px,'+txY+'px)';
    updatePageFromPos();
  }
},{passive:false});

vp.addEventListener('touchend',function(e){
  if(pinching && e.touches.length<2){
    pinching=false;
    // Re-render at new scale
    rerender();
  }
  if(e.touches.length===0) panning=false;
},{passive:true});

function getDist(t){
  var dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

// ── MOUSE WHEEL ZOOM (Ctrl) + SCROLL ──
vp.addEventListener('wheel',function(e){
  if(e.ctrlKey||e.metaKey){
    e.preventDefault();
    fitMode='none';
    var delta=e.deltaY>0?0.9:1.1;
    scale=Math.max(0.3,Math.min(5,scale*delta));
    zmDisp.textContent=Math.round(scale*100)+'%';
    store.scale=scale; save();
    rerender();
  } else {
    // Normal scroll
    txY-=e.deltaY;
    cc.style.transform='translate('+txX+'px,'+txY+'px)';
    updatePageFromPos();
  }
},{passive:false});

// ── UPDATE CURRENT PAGE FROM TRANSFORM POSITION ──
function updatePageFromPos(){
  if(!rendered) return;
  var visibleY=-txY+vp.clientHeight/2;
  var cumY=24;
  for(var i=1;i<=totalPages;i++){
    var h=pageHeights[i]||0;
    if(visibleY<=cumY+h+8){
      if(i!==currentPage){
        currentPage=i;
        updateUI();
        store.page=i; save();
      }
      return;
    }
    cumY+=h+16;
  }
}

// ── DOUBLE PAGE ──
function toggleDouble(){
  doubleMode=!doubleMode;
  document.getElementById('dbl-btn').classList.toggle('active',doubleMode);
  // Rearrange pages side by side
  cc.innerHTML='';
  if(doubleMode){
    for(var i=1;i<=totalPages;i+=2){
      var row=document.createElement('div');
      row.style.cssText='display:flex;gap:8px;flex-shrink:0;';
      cc.appendChild(row);
      // Re-render pair into row... for simplicity just re-render all
    }
  }
  rerender();
}

// ── BOOKMARKS ──
function getBookmarks(){return store.bookmarks||[];}
function addBookmark(){
  var bms=getBookmarks();
  if(!bms.find(function(b){return b.page===currentPage;})){
    bms.push({page:currentPage});
    store.bookmarks=bms; save();
    renderBmList(); updateBmDots();
    var btn=document.getElementById('bm-btn');
    btn.classList.add('active');
    setTimeout(function(){btn.classList.remove('active');},700);
  }
}
function removeBookmark(pg){
  store.bookmarks=(getBookmarks()).filter(function(b){return b.page!==pg;});
  save(); renderBmList(); updateBmDots();
}
function renderBmList(){
  var bms=getBookmarks();
  var list=document.getElementById('bm-list');
  var empty=document.getElementById('bm-empty');
  if(!bms.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=bms.sort(function(a,b){return a.page-b.page;}).map(function(bm){
    return '<div class="bm-item" onclick="jumpToPage('+bm.page+',true);toggleBmPanel(false);">'
      +'<span class="bm-pg">PAGE '+bm.page+'</span>'
      +'<button class="bm-del" onclick="event.stopPropagation();removeBookmark('+bm.page+')">✕</button>'
      +'</div>';
  }).join('');
}
function updateBmDots(){
  var bms=getBookmarks().map(function(b){return b.page;});
  for(var i=1;i<=totalPages;i++){
    var d=document.getElementById('bmdot'+i);
    if(d) d.classList.toggle('on',bms.indexOf(i)>-1);
  }
}
function toggleBmPanel(force){
  var p=document.getElementById('bm-panel');
  var open=p.classList.contains('open');
  var shouldOpen=force!==undefined?force:!open;
  p.classList.toggle('open',shouldOpen);
  document.getElementById('bm-panel-btn').classList.toggle('active',shouldOpen);
}

// ── KEYBOARD ──
document.addEventListener('keydown',function(e){
  if(e.target===pgInput) return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key==='PageDown') nextPage();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'||e.key==='PageUp') prevPage();
  if(e.key==='Home') jumpToPage(1,true);
  if(e.key==='End') jumpToPage(totalPages,true);
  if(e.key==='b'||e.key==='B') addBookmark();
  if(e.key==='+'||e.key==='=') zoomIn();
  if(e.key==='-') zoomOut();
  if((e.ctrlKey||e.metaKey)&&(e.key==='s'||e.key==='p')) e.preventDefault();
});

// ── BLOCK RIGHT CLICK ──
document.addEventListener('contextmenu',function(e){e.preventDefault();});
</script>
</body>
</html>
